server {
    listen 80;

    # 检查更新接口 → 返回 latest.json
    location = /api/update/latest {
        alias /usr/share/nginx/releases/latest.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # 安装包下载
    location /releases/ {
        alias /usr/share/nginx/releases/;
        add_header Access-Control-Allow-Origin *;
    }
}
